    <script>
    // see: https://cdn.jsdelivr.net/npm/@tabler/icons@3.24.0/
    // see: https://github.com/tabler/tabler-icons/issues/1310
    var tablerIconsFontVersion = '3.34.0';
    var tablerIconsFontUrl = `https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@${tablerIconsFontVersion}/dist/fonts/tabler-icons.woff2?v${tablerIconsFontVersion}`;
    var preloadLink = document.createElement('link');
    preloadLink.setAttribute('rel', 'preload');
    preloadLink.setAttribute('as', 'font');
    preloadLink.setAttribute('href', tablerIconsFontUrl);
    preloadLink.setAttribute('crossorigin', 'true');
    document.head.insertBefore(preloadLink, document.getElementById('tabler-font'));
    var tablerFontStyleSheet = document.getElementById('tabler-font');
    document.styleSheets[0].insertRule(`
      @font-face {
        font-family: "tabler-icons";
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url("${tablerIconsFontUrl}") format("woff2");
      }
    `);

    <link rel="stylesheet" type="text/css" href="Styling/variables.css"/>
    <link rel="stylesheet" type="text/css" href="Styling/generic.css"/>
    <link rel="stylesheet" type="text/css" href="Styling/dialog.css"/>
    <link rel="stylesheet" type="text/css" href="Styling/menu.css"/>
    <link rel="stylesheet" type="text/css" href="Styling/button.css"/>
    <link rel="stylesheet" type="text/css" href="Styling/button-actions.css"/>
    <link rel="stylesheet" type="text/css" href="Styling/textarea.css"/>
    <link rel="stylesheet" type="text/css" href="Styling/details.css"/>
    <link rel="stylesheet" type="text/css" href="Styling/select.css"/>
    
    <link rel="stylesheet" type="text/css" href="Tabs/tabs.css"/>
    <link rel="stylesheet" type="text/css" href="History/HistoryUi.css"/>
    <link rel="stylesheet" type="text/css" href="LLMPrompt/LLMPrompt.css"/>
    <link rel="stylesheet" type="text/css" href="LLMPrompt/PromptLibrary.css"/>
    <link rel="stylesheet" type="text/css" href="Conversation/Conversation.css"/>
    <link rel="stylesheet" type="text/css" href="LanguageTranslation/LanguageTranslationDialog.css"/>

    <link rel="stylesheet" type="text/css" href="Animations/banter.css"/>

    <link rel="stylesheet" type="text/css" href="DragableDialogs/DragableDialogs.css"/>
        
    <template id="chatHistoryNode">
      <details>
        <summary>
          <span></span>
        </summary>
        <menu role="toolbar">
          <li role="menuitem">
            <button 
              type="button" 
              name="download"
              value="downloadChat"
              title="Download this chat..."
            />
          </li>
          <li role="menuitem">
            <button 
              type="button" 
              name="copy"
              value="copyChat"
              title="Copy this chat to the clipboard..."
            />
          </li>
          <li role="menuitem">
            <button 
              type="button" 
              name="print"
              value="printChat"
              title="Send this chat to the printer..."
            />
          </li>
          <li role="menuitem">
            <button 
              type="button" 
              name="refresh"
              value="regenerateSummary"
              title="Regenerate the chat summary..."
            />
          </li>
          <li role="menuitem">
            <button 
              type="button" 
              name="restore"
              value="restoreChat"
              title="Continue this chat..."
            />
          </li>
          <li role="menuitem">
            <button 
              type="button" 
              name="delete"
              value="deleteChat"
              title="Delete this chat from the history"
            />
          </li>
        </menu>
        <div></div>
      </details>
    </template>
    
    <template id="request-ui">
      <div class="request">
        <header>
          <menu role="toolbar">
            <li role="menuitem">
              <button 
                type="button" 
                name="download"
                value="downloadPrompt"
                title="Download this prompt..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="copy"
                value="copyPrompt"
                title="Copy this prompt to the clipboard..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="print"
                value="printPrompt"
                title="Send this prompt to the printer..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="save"
                value="savePrompt"
                title="Save this prompt to the prompt library..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="wizard"
                value="promptWizard"
                title="Refine this prompt with the prompt wizard..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="translate"
                value="translatePrompt"
                title="Translate this prompt..."
                popovertarget="translation-dialog"
                popovertargetaction="show"
              />
            </li>
          </menu>
        </header>
        <section></section>
        <input type="hidden"/>
        <footer>
        </footer>
      </div>
    </template>

    <template id="response-ui">
      <div class="response">
        <header>
          <menu role="toolbar">
            <li role="menuitem">
              <button 
                type="button" 
                name="download"
                value="downloadResponse"
                title="Download this response..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="copy"
                value="copyResponse"
                title="Copy this response to the clipboard..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="print"
                value="printResponse"
                title="Send this response to the printer..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="summarize"
                value="summarizeResponse"
                title="Summarize this response..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="translate"
                value="translateResponse"
                title="Translate this response..."
                popovertarget="translation-dialog"
                popovertargetaction="show"                
              />
            </li>
            <li role="menuitem">
              <form role="menubar">
                <input role="menuitem" type="radio" name="format" value="formatted" checked title="View formatted"/>
                <input role="menuitem" type="radio" name="format" value="markdown" title="View Markdown code"/>
                <input role="menuitem" type="radio" name="format" value="html" title="View HTML code"/>
              </form>
            </li>
          </menu>
        </header>
        <section></section>
        <pre><code class="hljs language-markdown"></code></pre>
        <pre><code class="hljs language-html"></code></pre>
        <input type="hidden"/>
        <footer>
        </footer>
      </div>
    </template>
    
  </head>
  <body>
    <main
      id="app"
      data-app-status="booting"
    >
    
      <header>
        <menu role="toolbar">
          <li role="menuitem">
            <button 
              type="button"
              id="new-chat"
              name="new"
              value="new-chat"
            >New Chat</button>
            <button 
              type="button"
              id="translate-tool"
              name="translate"
              value="translate-tool"
              popovertarget="translation-dialog"
              popovertargetaction="toggle"
            >Translate</button>
          </li>
        </menu>
      </header>
      
      <nav id="sidebar">
        <form role="tablist">
          <div>
            <label role="tab" for="chatHistory">Chats</label>
            <input id="chatHistory" type="radio" name="tabs" checked="true"/>
            <div role="tabpanel"></div>
          </div>
          <div>
            <label role="tab" for="promptLibrary">Prompts</label>
            <input id="promptLibrary" type="radio" name="tabs"/>
            <div role="tabpanel">
              This is the content for tab2
            </div>
          </div>
        </form>
      </nav>
      
      <section 
        id="conversation" 
        class="conversation"
      ></section>
      
      <footer id="statusbar">
        footer
      </footer>

      <dialog 
        class="llm-prompt"
        id="generic-prompt"
        aria-labelledby="generic-prompt-title"
        draggable="true" 
        popover
        open
      >
        <div>
          <header>
            <h1 
              id="generic-prompt-title" 
              data-icon="&#63883;"
            >Prompt:</h1>
            <form role="toolbar">
              <input 
                name="windowstate" 
                type="radio" 
                value="minimize" 
                title="Minimize"
              />
              <input 
                name="windowstate" 
                type="radio" 
                value="maximize" 
                title="Maximize"
              />
              <input 
                name="windowstate" 
                type="radio" 
                value="restore"  
                title="Restore" 
                checked="true"
              />
              <!--
              <button 
                type="button"
                popovertarget="generic-prompt"
                popovertargetaction="hide"
                title="Close" 
              />
              -->
            </form>
          </header>
          <section>
            <menu role="toolbar">
              <li role="menuitem">
                <label 
                  title="Upload a text to use as prompt..."
                  for="uploadPrompt"
                >
                  <input
                    id="uploadPrompt"
                    name="uploadPromptText"
                    type="file"
                    multiple="false"
                    accept=".csv,.html,.md,text/*,.txt,.xml"
                  />
                </label>
              </li>            
            </menu>
            <textarea
              id="prompt-text"
              name="input-prompt"
              required
              placeholder="Type your prompt here..."
              autofocus="true"
              tabindex="0"
            ></textarea>
          </section>
          <footer>
            <form role="toolbar">
              <button
                id="send-prompt"
                type="button"
                name="send"
                value="send-prompt"
                tabindex="0"
              >Send</button>
              <button
                id="abort-request"
                type="button"
                name="abort"
                value="abort-response"
                tabindex="0"
              >Abort</button>
            </form>
          </footer>
        </div>
      </dialog>      
    </main>

    <dialog 
      id="info-dialog"
      style="
        height: 200px;
        width: 300px;
        top: calc( 50vh - 100px);
        left: calc( 50vw - 150px);
      "
      aria-labelledby="info-dialog-title"
      draggable="true" 
      popover
    >
      <div>
        <header>
          <h1 
            id="info-dialog-title" 
            data-icon="&#60101;"
          ></h1>
          <form role="toolbar">
            <input 
              name="windowstate" 
              type="radio" 
              value="minimize" 
              title="Minimize"
            />
            <input 
              name="windowstate" 
              type="radio" 
              value="maximize" 
              title="Maximize"
            />
            <input 
              name="windowstate" 
              type="radio" 
              value="restore"  
              title="Restore" 
              checked="true"
            />
            <button 
              type="button"
              popovertarget="info-dialog"
              popovertargetaction="hide"
              title="Close" 
              onclick="closeModal(this)"
            />
          </form>
        </header>
        <section>
        </section>
        <footer>
          <form role="toolbar">
            <button
              id="info-close"
              name="confirm"
              type="button"
              popovertarget="info-dialog"
              popovertargetaction="hide"
              tabindex="0"
              title="Close" 
              onclick="closeModal(this)"
            >Ok</button>
          </form>
        </footer>
      </div>
    </dialog>
    
    <dialog 
      id="translation-dialog"
      aria-labelledby="translation-dialog-title"
      draggable="true" 
      popover
    >
      <div>
        <header>
          <h1 
            id="translation-dialog-title" 
            data-icon="&#60350;"
          >Translate...</h1>
          <form role="toolbar">
            <input 
              name="windowstate" 
              type="radio" 
              value="minimize" 
              title="Minimize"
            />
            <input 
              name="windowstate" 
              type="radio" 
              value="maximize" 
              title="Maximize"
            />
            <input 
              name="windowstate" 
              type="radio" 
              value="restore"  
              title="Restore" 
              checked="true"
            />
            <button 
              type="button"
              popovertarget="translation-dialog"
              popovertargetaction="hide"
              title="Close" 
              onclick="closeModal(this)"
            />
          </form>
        </header>
        <section>
          <form name="translateDialogSettingForm">
            <input 
              type="hidden" 
              name="state"
            />
            <header>
              <menu role="toolbar">
                <li role="menuitem">
                  <label 
                    title="Upload a text to translate..."
                    for="uploadSourceText"
                  >
                    <input
                      id="uploadSourceText"
                      name="uploadSourceText"
                      type="file"
                      multiple="false"
                      accept=".csv,.html,.md,text/*,.txt,.xml"
                    />
                  </label>
                </li>            
                <li role="menuitem">
                  <label 
                    for="sourceLanguage-picker"
                    title="Select the language of the text that is to be translated."
                  >From</label>
                  <select 
                    id="sourceLanguage-picker" 
                    name="sourceLanguage-picker"
                    title="Select the language of the text that is to be translated."
                  >
                  </select>
                  <input 
                    type="hidden" 
                    name="sourceLanguage"
                    id="sourceLanguage"
                    required
                  />
                </li>
                <li role="menuitem">
                  <label for ="targetLanguage-picker">To</label>
                  <select 
                    id="targetLanguage-picker" 
                    name="targetLanguage-picker"
                    required
                  >
                  </select>
                </li>
                <li role="menuitem">
                  <label 
                    for="liveTranslation"
                    title="Check to automatically update the translation."
                  >Auto-translate</label>
                  <input 
                    id="liveTranslation" 
                    name="autodetect"
                    type="checkbox" 
                    checked="true"
                    title="Check to automatically update the translation."
                  />
                </li>
                <li role="menuitem">
                  <button
                    id="translate"
                    name="translate"
                    type="button"
                    value="translate"
                    title="Click to translate."
                  />
                </li>
              </menu>
            </header>
            <textarea 
              id="sourceLanguage-text"
              name="sourceLanguage-text"
              spellcheck="true"
              required
              autofocus
            ></textarea>
          </form>
          <div class="response">
            <header>
              <menu role="toolbar">
                <li role="menuitem">
                  <button 
                    type="button" 
                    name="download"
                    value="downloadTargetText"
                    title="Download the translated text..."
                  />
                </li>
                <li role="menuitem">
                  <button 
                    type="button" 
                    name="copy"
                    value="copyChat"
                    title="Copy this chat to the clipboard..."
                  />
                </li>
                <li role="menuitem">
                  <form role="menubar">
                    <input role="menuitem" type="radio" name="format" value="formatted" checked title="View formatted"/>
                    <input role="menuitem" type="radio" name="format" value="markdown" title="View Markdown code"/>
                    <input role="menuitem" type="radio" name="format" value="html" title="View HTML code"/>
                  </form>
                </li>              
              </menu>
            </header>
            <section></section>
            <pre><code class="hljs language-markdown"></code></pre>
            <pre><code class="hljs language-html"></code></pre>
            <input type="hidden" id="targetLanguage-text" name="targetLanguage-text"/>
          </div>
        </section>
        <footer>
          <form role="toolbar">
            <button
              name="confirm"
              type="button"
              tabindex="0"
              title="Close" 
            >Ok</button>
          </form>
        </footer>
      </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked-highlight@2.2.2/lib/index.umd.min.js"></script>
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>

    <script src="Dom/dom.js"></script>
    <script src="Clipboard/clipboard.js"></script>
    <script src="Downloader/Downloader.js"></script>
    <script src="DragableDialogs/DragableDialogs.js"></script>
    <script src="Tabs/tabs.js"></script>
    <script src="FormState/FormState.js"></script>

    <script src="LanguageDetection/LanguageDetection.js"></script>
    <script src="LanguageTranslation/LanguageTranslation.js"></script>
    <script src="LanguageTranslation/Translator.js"></script>
    <script src="Summarizer/Summarizer.js"></script>
    <script src="History/HistoryBackend.js"></script>
    <script src="History/HistoryUi.js"></script>
    <script src="Conversation/Conversation.js"></script>
    <script src="LLMPrompt/LLMPrompt.js"></script>
    <script src="Formatting/Formatting.js"></script>
    <script src="Main/main.js"></script>
    
  </body>
</html>
