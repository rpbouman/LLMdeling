    <script>
    // see: https://cdn.jsdelivr.net/npm/@tabler/icons@3.24.0/
    // see: https://github.com/tabler/tabler-icons/issues/1310
    var tablerIconsFontVersion = '3.34.0';
    var tablerIconsFontUrl = `https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@${tablerIconsFontVersion}/dist/fonts/tabler-icons.woff2?v${tablerIconsFontVersion}`;
    var preloadLink = document.createElement('link');
    preloadLink.setAttribute('rel', 'preload');
    preloadLink.setAttribute('as', 'font');
    preloadLink.setAttribute('href', tablerIconsFontUrl);
    preloadLink.setAttribute('crossorigin', 'true');
    document.head.insertBefore(preloadLink, document.getElementById('tabler-font'));
    var tablerFontStyleSheet = document.getElementById('tabler-font');
    document.styleSheets[0].insertRule(`
      @font-face {
        font-family: "tabler-icons";
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url("${tablerIconsFontUrl}") format("woff2");

    <template id="chatHistoryNode">
      <details>
        <summary>
          <span></span>
        </summary>
        <menu role="toolbar">
          <li role="menuitem">
            <button 
              type="button" 
              name="download"
              value="downloadChat"
              title="Download this chat..."
            />
          </li>
          <li role="menuitem">
            <button 
              type="button" 
              name="copy"
              value="copyChat"
              title="Copy this chat to the clipboard..."
            />
          </li>
          <li role="menuitem">
            <button 
              type="button" 
              name="refresh"
              value="regenerateSummary"
              title="Regenerate the chat summary..."
            />
          </li>
          <li role="menuitem">
            <button 
              type="button" 
              name="restore"
              value="restoreChat"
              title="Continue this chat..."
            />
          </li>
          <li role="menuitem">
            <button 
              type="button" 
              name="delete"
              value="deleteChat"
              title="Delete this chat from the history"
            />
          </li>
        </menu>
        <div></div>
      </details>
    </template>
    
    <template id="request-ui">
      <div class="request">
        <header>
          <menu role="toolbar">
            <li role="menuitem">
              <button 
                type="button" 
                name="download"
                value="downloadPrompt"
                title="Download this prompt..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="copy"
                value="copyPrompt"
                title="Copy this prompt to the clipboard..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="save"
                value="savePrompt"
                title="Save this prompt to the prompt library..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="wizard"
                value="promptWizard"
                title="Refine this prompt with the prompt wizard..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="translate"
                value="translatePrompt"
                title="Translate this prompt..."
              />
            </li>
          </menu>
        </header>
        <section></section>
        <input type="hidden"/>
        <footer>
        </footer>
      </div>
    </template>

    <template id="response-ui">
      <div class="response">
        <header>
          <menu role="toolbar">
            <li role="menuitem">
              <button 
                type="button" 
                name="download"
                value="downloadResponse"
                title="Download this response..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="copy"
                value="copyResponse"
                title="Copy this response to the clipboard..."
              />
            </li>
            <li role="menuitem">
              <form role="menubar">
                <input role="menuitem" type="radio" name="format" value="formatted" checked title="View formatted"/>
                <input role="menuitem" type="radio" name="format" value="markdown" title="View Markdown code"/>
                <input role="menuitem" type="radio" name="format" value="html" title="View HTML code"/>
              </form>
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="summarize"
                value="summarizeResponse"
                title="Summarize this response..."
              />
            </li>
            <li role="menuitem">
              <button 
                type="button" 
                name="translate"
                value="translateResponse"
                title="Translate this response..."
              />
            </li>
          </menu>
        </header>
        <section></section>
        <pre><code class="hljs language-markdown"></code></pre>
        <pre><code class="hljs language-html"></code></pre>
        <input type="hidden"/>
        <footer>
        </footer>
      </div>
    </template>
    
  </head>
  <body>
    <main
      id="app"
      data-app-status="booting"
    >
    
      <header>
        <menu role="toolbar">
          <li role="menuitem">
            <label for="new-chat">
              New Chat
            </label>
            <button id="new-chat"/>
          </li>
        </menu>
      </header>
      
      <nav id="sidebar">
        <form role="tablist">
          <div>
            <label role="tab" for="chatHistory">Chats</label>
            <input id="chatHistory" type="radio" name="tabs" checked="true"/>
            <div role="tabpanel"></div>
          </div>
          <div>
            <label role="tab" for="promptLibrary">Prompts</label>
            <input id="promptLibrary" type="radio" name="tabs"/>
            <div role="tabpanel">
              This is the content for tab2
            </div>
          </div>
        </form>
      </nav>
      
      <section 
        id="conversation" 
        class="conversation"
      ></section>
      
      <footer id="statusbar">
        footer
      </footer>

      <dialog 
        class="llm-prompt"
        id="generic-prompt"
        aria-labelledby="generic-prompt-title"
        draggable="true" 
        popover
        open
      >
        <div>
          <header>
            <h1 id="generic-prompt-title">Prompt:</h1>
            <form role="toolbar">
              <input 
                name="windowstate" 
                type="radio" 
                value="minimize" 
                title="Minimize"
              />
              <input 
                name="windowstate" 
                type="radio" 
                value="maximize" 
                title="Maximize"
              />
              <input 
                name="windowstate" 
                type="radio" 
                value="restore"  
                title="Restore" 
                checked="true"
              />
              <!--
              <button 
                type="button"
                popovertarget="generic-prompt"
                popovertargetaction="hide"
                title="Close" 
              />
              -->
            </form>
          </header>
          <section>
            <textarea
              id="prompt-text"
              name="input-prompt"
              required
              placeholder="Type your prompt here..."
              autofocus="true"
              tabindex="0"
            ></textarea>
          </section>
          <footer>
            <form role="toolbar">
              <button
                id="send-prompt"
                type="button"
                name="send-prompt"
                tabindex="0"
              >Send</button>
              <button
                id="abort-request"
                type="button"
                name="abort-response"
                tabindex="0"
              >Cancel</button>
            </form>
          </footer>
        </div>
      </dialog>      
    </main>

    <dialog 
      id="info-dialog"
      style="
        height: 200px;
        width: 300px;
        top: calc( 50vh - 100px);
        left: calc( 50vw - 150px);
      "
      aria-labelledby="info-dialog-title"
      draggable="true" 
      popover
    >
      <div>
        <header>
          <h1 id="info-dialog-title" data-icon="eac5"></h1>
          <form role="toolbar">
            <input 
              name="windowstate" 
              type="radio" 
              value="minimize" 
              title="Minimize"
            />
            <input 
              name="windowstate" 
              type="radio" 
              value="maximize" 
              title="Maximize"
            />
            <input 
              name="windowstate" 
              type="radio" 
              value="restore"  
              title="Restore" 
              checked="true"
            />
            <button 
              type="button"
              popovertarget="info-dialog"
              popovertargetaction="hide"
              title="Close" 
              onclick="closeModal(this)"
            />
          </form>
        </header>
        <section>
        </section>
        <footer>
          <form role="toolbar">
            <button
              id="info-close"
              type="button"
              popovertarget="info-dialog"
              popovertargetaction="hide"
              tabindex="0"
              title="Close" 
              onclick="closeModal(this)"
            >Ok</button>
          </form>
        </footer>
      </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked-highlight@2.2.2/lib/index.umd.min.js"></script>
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
    <script>
    /**
    * Setup for highlighting code blocks.
    *   This requires "marked-highlight" a plugin for marked to allow code blocks to be handled separately.
    *   But "marked-highlight" only enables separate processing of code blocks, the actual highlighting is down by highlight.js
    * 
    * See: 
    *   https://marked.js.org/using_pro#extensions
    *   https://www.npmjs.com/package/marked-highlight
    *   https://highlightjs.readthedocs.io/en/latest/readme.html#id3
    */
    const { Marked } = globalThis.marked;
    const { markedHighlight } = globalThis.markedHighlight;
    const marked = new Marked(
      markedHighlight({
        emptyLangClass: 'hljs',
        langPrefix: 'hljs language-',
        highlight(code, lang, info) {
          const language = hljs.getLanguage(lang) ? lang : 'plaintext';
          return hljs.highlight(code, { language }).value;
        }
      })
    );    
    </script>

    <script src="main.js"></script>
